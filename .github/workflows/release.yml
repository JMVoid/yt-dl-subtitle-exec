name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: yt-dl-subtitle-linux
            out_name: yt-dl-subtitle-linux
          - os: macos-latest
            artifact_name: yt-dl-subtitle-macos
            out_name: yt-dl-subtitle-macos
          - os: windows-latest
            artifact_name: yt-dl-subtitle-windows
            out_name: yt-dl-subtitle-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller yt-dl-subtitle.spec --clean

      - name: Rename executable
        run: mv dist/yt-dl-subtitle* dist/${{ matrix.out_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/yt-dl-subtitle*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yt-dl-subtitle-linux/yt-dl-subtitle-linux
            dist/yt-dl-subtitle-macos/yt-dl-subtitle-macos
            dist/yt-dl-subtitle-windows/yt-dl-subtitle-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Create tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a ${{ inputs.version }} -m "Release ${{ inputs.version }}"
          git push origin ${{ inputs.version }}
