name: Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: yt-dl-subtitle-linux
          - os: macos-latest
            artifact_name: yt-dl-subtitle-macos
          - os: windows-latest
            artifact_name: yt-dl-subtitle-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller yt-dl-subtitle.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/yt-dl-subtitle*
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-dl-subtitle-linux
          path: dist/

      - name: Make executable and test
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then chmod +x dist/yt-dl-subtitle; fi
          ./dist/yt-dl-subtitle --help
